[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.format]
# Enforce double quotes (Ruff default — explicit for clarity)
quote-style = "double"
indent-style = "space"

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes (unused imports, undefined names, etc.)
    "I",    # isort (import ordering)
    "ANN",  # flake8-annotations (type hint enforcement)
    "B",    # flake8-bugbear (common bug patterns)
    "C4",   # flake8-comprehensions (cleaner list/dict comprehensions)
    "UP",   # pyupgrade (modernize Python syntax automatically)
    "D",    # pydocstring (docstring conventions)
    "N",    # pep8-naming (naming conventions)
    "RUF",  # Ruff-specific rules
]
ignore = [
    "D100",    # Missing docstring in public module — too noisy
    "D104",    # Missing docstring in public package — too noisy
    "D106",    # Missing docstring in public nested class — too noisy for Meta classes
    "D203",    # one-blank-line-before-class — conflicts with D211 (no-blank-line-before-class)
    "D213",    # multi-line-summary-second-line — conflicts with D212 (first-line summary)
]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.isort]
# Enforce the three-group import order: stdlib, third-party, local
known-first-party = ["accounts", "onboarding", "generator", "generation", "config", "models"]

[tool.ruff.lint.per-file-ignores]
# Test files: don't require docstrings on every test function, and allow
# assert statements and unused imports (fixtures are "unused" from linter's view)
"tests/**/*.py" = ["D", "ANN", "S101"]
# Migrations: auto-generated by Django, not subject to our style rules
"**/migrations/*.py" = ["D", "ANN", "E501", "RUF"]
# Settings file: Django settings use patterns that look odd to a linter
"generator/settings.py" = ["N802", "N806"]
# Pydantic validator methods must accept Any — ANN401 is a false positive here
"models/onboarding.py" = ["ANN401"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
DJANGO_SETTINGS_MODULE = "generator.settings"
